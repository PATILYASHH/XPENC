# Reference copy of the fdroiddata recipe for XPENC â€” the live version is in
# the fdroiddata MR (gitlab.com/fdroid/fdroiddata, metadata/com.yash.xpenc.yml).
# Kept here so the repo documents its own F-Droid packaging. Verified with
# `fdroid lint` + `fdroid rewritemeta` (canonical format, no diff).
#
# versionCode scheme (F-Droid standard for Flutter, set in build.gradle.kts):
#   base versionCode * 10 + ABI  (armeabi-v7a=1, arm64-v8a=2, x86_64=3).
#   1.1.2+4 -> 41 / 42 / 43, verified with aapt. Encoded in VercodeOperation.
# commit: uses the full hash (not a tag) per F-Droid review.
# Flutter version is extracted (digit-anchored sed) from release.yml at build
# time. No `rm:` â€” the project is Android-only (no ios/linux/macos/web/windows).

Categories:
  - Finance Manager
License: MIT
AuthorName: Yash Patil
AuthorEmail: patilyasshh@gmail.com
AuthorWebSite: https://github.com/PATILYASHH
WebSite: https://getxpenc.vercel.app
SourceCode: https://github.com/PATILYASHH/XPENC
IssueTracker: https://github.com/PATILYASHH/XPENC/issues
Changelog: https://github.com/PATILYASHH/XPENC/blob/HEAD/CHANGELOG.md

AutoName: XPENC

RepoType: git
Repo: https://github.com/PATILYASHH/XPENC.git

Builds:
  - versionName: 1.1.2
    versionCode: 41
    commit: 4c2768a0b5d76e034790c8f7864a4e4f46d8a43a
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '([0-9][^']*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.1.2
    versionCode: 42
    commit: 4c2768a0b5d76e034790c8f7864a4e4f46d8a43a
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '([0-9][^']*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64

  - versionName: 1.1.2
    versionCode: 43
    commit: 4c2768a0b5d76e034790c8f7864a4e4f46d8a43a
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '([0-9][^']*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-x64

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
VercodeOperation:
  - '%c * 10 + 1'
  - '%c * 10 + 2'
  - '%c * 10 + 3'
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.2
CurrentVersionCode: 43
