# Draft fdroiddata recipe for XPENC.
# To submit: copy this file to fdroiddata as metadata/com.yash.xpenc.yml
# (gitlab.com/fdroid/fdroiddata) and open a merge request — see README.md
# in this folder. Remove these header comments before submitting.
#
# versionCode scheme: pubspec `version: X.Y.Z+N`; `flutter build apk
# --split-per-abi` emits N+1000 (armeabi-v7a), N+2000 (arm64-v8a),
# N+4000 (x86_64) — verified with aapt on the 1.1.0+2 build (1002/2002/4002).

Categories:
  - Money
License: MIT
AuthorName: Yash Patil
AuthorEmail: patilyasshh@gmail.com
AuthorWebSite: https://github.com/PATILYASHH
WebSite: https://getxpenc.vercel.app
SourceCode: https://github.com/PATILYASHH/XPENC
IssueTracker: https://github.com/PATILYASHH/XPENC/issues
Changelog: https://github.com/PATILYASHH/XPENC/blob/master/CHANGELOG.md

AutoName: XPENC

RepoType: git
Repo: https://github.com/PATILYASHH/XPENC.git

Builds:
  - versionName: 1.1.0
    versionCode: 1002
    commit: v1.1.0
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@3.38.9
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.1.0
    versionCode: 2002
    commit: v1.1.0
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@3.38.9
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64

  - versionName: 1.1.0
    versionCode: 4002
    commit: v1.1.0
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    srclibs:
      - flutter@3.38.9
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-x64

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
VercodeOperation:
  - '%c + 1000'
  - '%c + 2000'
  - '%c + 4000'
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.0
CurrentVersionCode: 4002
