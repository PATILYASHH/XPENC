name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "website/**"
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "website/**"
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # drift's NativeDatabase in VM tests loads sqlite3 from the host.
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
