<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 230" width="840" height="230" role="img" aria-label="XPENC — Money, tracked honestly.">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17171a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101014"/>
      <stop offset="1" stop-color="#060608"/>
    </linearGradient>
  </defs>

  <!-- banner card -->
  <rect x="1" y="1" width="838" height="228" rx="26" fill="url(#card)" stroke="#26262d"/>

  <!-- logo tile -->
  <g transform="translate(48,49)">
    <rect width="132" height="132" rx="30" fill="url(#tile)" stroke="#2c2c33"/>
    <g transform="scale(0.1289)" stroke-linecap="round" fill="none">
      <!-- descending stroke: draws, holds, redraws -->
      <line x1="290.8" y1="290.8" x2="733.2" y2="733.2" stroke="#FFFFFF" stroke-width="131.1"
            stroke-dasharray="626" stroke-dashoffset="626">
        <animate attributeName="stroke-dashoffset" values="626;0;0;626" keyTimes="0;0.18;0.92;1"
                 dur="7s" repeatCount="indefinite" calcMode="spline"
                 keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      </line>
      <!-- seam (punch-out) + ascending stroke -->
      <line x1="290.8" y1="733.2" x2="733.2" y2="290.8" stroke="#000000" stroke-width="192.5"
            stroke-dasharray="626" stroke-dashoffset="626">
        <animate attributeName="stroke-dashoffset" values="626;626;0;0;626" keyTimes="0;0.12;0.3;0.92;1"
                 dur="7s" repeatCount="indefinite" calcMode="spline"
                 keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      </line>
      <line x1="290.8" y1="733.2" x2="733.2" y2="290.8" stroke="#FFFFFF" stroke-width="131.1"
            stroke-dasharray="626" stroke-dashoffset="626">
        <animate attributeName="stroke-dashoffset" values="626;626;0;0;626" keyTimes="0;0.12;0.3;0.92;1"
                 dur="7s" repeatCount="indefinite" calcMode="spline"
                 keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
      </line>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="224" y="112" font-size="58" font-weight="800" letter-spacing="10" fill="#ffffff" opacity="0">
      XPENC
      <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.8s" fill="freeze"/>
    </text>
    <text x="228" y="152" font-size="21" font-weight="500" fill="#9b9ba4" opacity="0">
      Money, tracked honestly.
      <animate attributeName="opacity" values="0;1" begin="1.1s" dur="0.9s" fill="freeze"/>
    </text>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.9s" fill="freeze"/>
      <text x="228" y="188" font-size="14" fill="#5d5d66">100% offline · 0 servers · integer-paise math · free &amp; open source</text>
    </g>
  </g>

  <!-- animated ticker dots (subtle life on the right edge) -->
  <g fill="#34c77b">
    <circle cx="770" cy="84" r="3" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#ffffff">
    <circle cx="770" cy="115" r="3" opacity="0.1">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#ff5c5c">
    <circle cx="770" cy="146" r="3" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
